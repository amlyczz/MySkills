<!doctype html>
<html lang="en" data-resolution="landscape">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <script src="https://cdn.bootcdn.net/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1920px; height: 1080px; overflow: hidden; background: #0a0a0f; font-family: 'Inter', 'Helvetica Neue', sans-serif; -webkit-font-smoothing: antialiased; }

    /* ═══ Fluid Aurora (CSS gradient blobs) ═══ */
    .fluid-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.7;
      mix-blend-mode: screen;
      will-change: transform;
    }
    #fluid-b1 { width: 900px; height: 900px; background: radial-gradient(circle, #FF6B6B 0%, #FF8E53 30%, transparent 70%); }
    #fluid-b2 { width: 800px; height: 800px; background: radial-gradient(circle, #4ECDC4 0%, #44A08D 30%, transparent 70%); }
    #fluid-b3 { width: 950px; height: 950px; background: radial-gradient(circle, #6C5CE7 0%, #A29BFE 25%, transparent 70%); }
    #fluid-b4 { width: 700px; height: 700px; background: radial-gradient(circle, #F9CA24 0%, #F0932B 35%, transparent 70%); }
    #fluid-b5 { width: 850px; height: 850px; background: radial-gradient(circle, #E056A0 0%, #FD79A8 30%, transparent 70%); }

    /* ═══ Light beams ═══ */
    .light-beam {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      opacity: 0;
      pointer-events: none;
    }

    /* ═══ Tech lines ═══ */
    .tech-line { stroke: rgba(255,255,255,0.5); opacity: 0; }
    .tech-circle { fill: none; stroke: rgba(255,255,255,0.4); opacity: 0; }
    .tech-cross { stroke: rgba(255,255,255,0.6); opacity: 0; }
  </style>
</head>
<body>

<div id="root"
     data-composition-id="elevenlabs-promo"
     data-start="0" data-duration="52.6"
     data-width="1920" data-height="1080">

  <!-- ════════════════════════ LAYER 1: Fluid Aurora ════════════════════════ -->
  <div id="fluid-b1" class="fluid-blob clip" data-start="0" data-duration="52.6" data-track-index="1"></div>
  <div id="fluid-b2" class="fluid-blob clip" data-start="0" data-duration="52.6" data-track-index="2"></div>
  <div id="fluid-b3" class="fluid-blob clip" data-start="0" data-duration="52.6" data-track-index="3"></div>
  <div id="fluid-b4" class="fluid-blob clip" data-start="0" data-duration="52.6" data-track-index="4"></div>
  <div id="fluid-b5" class="fluid-blob clip" data-start="0" data-duration="52.6" data-track-index="5"></div>

  <!-- ════════════════════════ LAYER 2: Scenes ════════════════════════ -->
  <div id="scene1-wrapper" class="clip"
       data-composition-id="scene1-host"
       data-composition-src="compositions/scene1.html"
       data-start="3" data-duration="7" data-track-index="10"></div>

  <div id="scene2-wrapper" data-composition-id="scene2-host" class="clip"
       data-composition-src="compositions/scene2.html"
       data-start="10" data-duration="8.1" data-track-index="10"></div>

  <div id="scene3-wrapper" data-composition-id="scene3-host" class="clip"
       data-composition-src="compositions/scene3.html"
       data-start="18.1" data-duration="13.5" data-track-index="10"></div>

  <div id="scene4-wrapper" data-composition-id="scene4-host" class="clip"
       data-composition-src="compositions/scene4.html"
       data-start="31.6" data-duration="11" data-track-index="10"></div>

  <div id="scene5-wrapper" data-composition-id="scene5-host" class="clip"
       data-composition-src="compositions/scene5.html"
       data-start="42.6" data-duration="10" data-track-index="10"></div>

  <!-- ════════════════════════ LAYER 3: Light beams ════════════════════════ -->
  <div id="beam1" class="light-beam clip" data-start="0" data-duration="52.6" data-track-index="90"
       style="background:linear-gradient(-50deg,transparent 0%,rgba(255,255,255,0.15) 45%,rgba(255,255,255,0.35) 50%,rgba(255,255,255,0.15) 55%,transparent 100%);width:300%;height:25%;top:40%;left:-100%;filter:blur(60px)"></div>
  <div id="beam2" class="light-beam clip" data-start="0" data-duration="52.6" data-track-index="91"
       style="background:linear-gradient(-30deg,transparent 0%,rgba(255,255,255,0.12) 45%,rgba(255,255,255,0.25) 50%,rgba(255,255,255,0.12) 55%,transparent 100%);width:250%;height:20%;top:45%;left:-75%;filter:blur(50px)"></div>

  <!-- ════════════════════════ LAYER 4: Tech UI ════════════════════════ -->
  <div class="clip" data-start="0" data-duration="52.6" data-track-index="95" style="position:absolute;inset:0;pointer-events:none">
    <svg width="100%" height="100%" viewBox="0 0 1920 1080">
      <!-- Grid -->
      <g id="tech-grid">
        <line class="tech-line" x1="0" y1="10%" x2="100%" y2="10%" stroke-width="0.5" />
        <line class="tech-line" x1="0" y1="20%" x2="100%" y2="20%" stroke-width="0.5" />
        <line class="tech-line" x1="0" y1="30%" x2="100%" y2="30%" stroke-width="0.5" />
        <line class="tech-line" x1="0" y1="40%" x2="100%" y2="40%" stroke-width="0.5" />
        <line class="tech-line" x1="0" y1="50%" x2="100%" y2="50%" stroke-width="0.5" />
        <line class="tech-line" x1="0" y1="60%" x2="100%" y2="60%" stroke-width="0.5" />
        <line class="tech-line" x1="0" y1="70%" x2="100%" y2="70%" stroke-width="0.5" />
        <line class="tech-line" x1="0" y1="80%" x2="100%" y2="80%" stroke-width="0.5" />
        <line class="tech-line" x1="0" y1="90%" x2="100%" y2="90%" stroke-width="0.5" />
        <line class="tech-line" x1="10%" y1="0" x2="10%" y2="100%" stroke-width="0.5" />
        <line class="tech-line" x1="20%" y1="0" x2="20%" y2="100%" stroke-width="0.5" />
        <line class="tech-line" x1="30%" y1="0" x2="30%" y2="100%" stroke-width="0.5" />
        <line class="tech-line" x1="40%" y1="0" x2="40%" y2="100%" stroke-width="0.5" />
        <line class="tech-line" x1="50%" y1="0" x2="50%" y2="100%" stroke-width="0.5" />
        <line class="tech-line" x1="60%" y1="0" x2="60%" y2="100%" stroke-width="0.5" />
        <line class="tech-line" x1="70%" y1="0" x2="70%" y2="100%" stroke-width="0.5" />
        <line class="tech-line" x1="80%" y1="0" x2="80%" y2="100%" stroke-width="0.5" />
        <line class="tech-line" x1="90%" y1="0" x2="90%" y2="100%" stroke-width="0.5" />
      </g>
      <!-- Circles -->
      <circle class="tech-circle" id="tc1" cx="50%" cy="50%" r="180" stroke-width="1" />
      <circle class="tech-circle" id="tc2" cx="50%" cy="50%" r="280" stroke-width="0.5" />
      <circle class="tech-circle" id="tc3" cx="50%" cy="50%" r="400" stroke-width="0.3" />
      <!-- Crosshairs -->
      <g id="tech-crosshairs">
        <g transform="translate(288, 216)"><line class="tech-cross" x1="-6" y1="0" x2="6" y2="0" stroke-width="1"/><line class="tech-cross" x1="0" y1="-6" x2="0" y2="6" stroke-width="1"/></g>
        <g transform="translate(672, 324)"><line class="tech-cross" x1="-8" y1="0" x2="8" y2="0" stroke-width="1"/><line class="tech-cross" x1="0" y1="-8" x2="0" y2="8" stroke-width="1"/></g>
        <g transform="translate(1056, 432)"><line class="tech-cross" x1="-6" y1="0" x2="6" y2="0" stroke-width="1"/><line class="tech-cross" x1="0" y1="-6" x2="0" y2="6" stroke-width="1"/></g>
        <g transform="translate(1440, 270)"><line class="tech-cross" x1="-10" y1="0" x2="10" y2="0" stroke-width="1"/><line class="tech-cross" x1="0" y1="-10" x2="0" y2="10" stroke-width="1"/></g>
        <g transform="translate(480, 648)"><line class="tech-cross" x1="-7" y1="0" x2="7" y2="0" stroke-width="1"/><line class="tech-cross" x1="0" y1="-7" x2="0" y2="7" stroke-width="1"/></g>
        <g transform="translate(864, 756)"><line class="tech-cross" x1="-5" y1="0" x2="5" y2="0" stroke-width="1"/><line class="tech-cross" x1="0" y1="-5" x2="0" y2="5" stroke-width="1"/></g>
        <g transform="translate(1248, 594)"><line class="tech-cross" x1="-9" y1="0" x2="9" y2="0" stroke-width="1"/><line class="tech-cross" x1="0" y1="-9" x2="0" y2="9" stroke-width="1"/></g>
        <g transform="translate(1632, 810)"><line class="tech-cross" x1="-6" y1="0" x2="6" y2="0" stroke-width="1"/><line class="tech-cross" x1="0" y1="-6" x2="0" y2="6" stroke-width="1"/></g>
        <g transform="translate(192, 864)"><line class="tech-cross" x1="-7" y1="0" x2="7" y2="0" stroke-width="1"/><line class="tech-cross" x1="0" y1="-7" x2="0" y2="7" stroke-width="1"/></g>
      </g>
    </svg>
  </div>

  <!-- ════════════════════════ LAYER 5: Film grain ════════════════════════ -->
  <div class="clip" data-start="0" data-duration="52.6" data-track-index="99"
       style="position:absolute;inset:0;mix-blend-mode:overlay;opacity:0.04;pointer-events:none">
    <svg width="100%" height="100%"><filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(#grain)"/></svg>
  </div>

</div>

<script>
  window.__timelines = window.__timelines || {};
  var tl = gsap.timeline({ paused: true });
  var D = 52.6;

  // ── Fluid blobs: sinusoidal motion ──
  var blobSteps = 100;
  for (var i = 0; i <= blobSteps; i++) {
    var t = (i / blobSteps) * D;
    var phase = (i / blobSteps) * Math.PI * 2;
    tl.set("#fluid-b1", { x: 200 + 180 * Math.sin(t * 0.3), y: 100 + 150 * Math.cos(t * 0.25) }, t);
    tl.set("#fluid-b2", { x: 700 + 200 * Math.cos(t * 0.22), y: -50 + 180 * Math.sin(t * 0.28) }, t);
    tl.set("#fluid-b3", { x: 400 + 160 * Math.sin(t * 0.35), y: 400 + 140 * Math.cos(t * 0.2) }, t);
    tl.set("#fluid-b4", { x: -100 + 220 * Math.cos(t * 0.18), y: 300 + 170 * Math.sin(t * 0.32) }, t);
    tl.set("#fluid-b5", { x: 900 + 190 * Math.sin(t * 0.27), y: 500 + 160 * Math.cos(t * 0.23) }, t);
  }

  // ── Light beams: sweep across screen ──
  // Beam 1: appears at ~3s, 15s, 30s, 42s
  [3.5, 15.2, 29.0, 42.0].forEach(function(st, idx) {
    tl.fromTo("#beam1", { opacity: 0, y: -400 }, { opacity: 0.7, y: 400, duration: 1.5, ease: "power2.inOut" }, st);
    tl.to("#beam1", { opacity: 0, duration: 0.8 }, st + 1.5);
  });
  [8.0, 22.0, 35.0, 46.0].forEach(function(st, idx) {
    tl.fromTo("#beam2", { opacity: 0, y: 400 }, { opacity: 0.5, y: -400, duration: 1.2, ease: "power2.inOut" }, st);
    tl.to("#beam2", { opacity: 0, duration: 0.6 }, st + 1.2);
  });

  // ── Tech UI: grid + circles + crosshairs fade in/out ──
  // Grid appears around 10s, fades around 38s
  var techLines = document.querySelectorAll(".tech-line");
  techLines.forEach(function(ln, i) {
    tl.fromTo(ln, { opacity: 0 }, { opacity: 0.12, duration: 0.5, ease: "power2.out" }, 10 + i * 0.02);
    tl.to(ln, { opacity: 0, duration: 0.5, ease: "power2.in" }, 38 + i * 0.02);
  });

  // Circles
  tl.fromTo("#tc1", { opacity: 0, scale: 0.8 }, { opacity: 0.5, scale: 1, duration: 0.8, ease: "expo.out" }, 11);
  tl.to("#tc1", { opacity: 0, duration: 0.5 }, 38);
  tl.fromTo("#tc2", { opacity: 0, scale: 0.8 }, { opacity: 0.35, scale: 1, duration: 0.8, ease: "expo.out" }, 11.5);
  tl.to("#tc2", { opacity: 0, duration: 0.5 }, 37.5);
  tl.fromTo("#tc3", { opacity: 0, scale: 0.8 }, { opacity: 0.25, scale: 1, duration: 0.8, ease: "expo.out" }, 12);
  tl.to("#tc3", { opacity: 0, duration: 0.5 }, 37);

  // Crosshairs
  var crosses = document.querySelectorAll(".tech-cross");
  crosses.forEach(function(cr, i) {
    tl.fromTo(cr, { opacity: 0, scale: 0.3 }, { opacity: 1, scale: 1, duration: 0.3, ease: "back.out(1.5)" }, 12 + i * 0.3);
    tl.to(cr, { opacity: 0, duration: 0.3 }, 37 + i * 0.2);
  });

  tl.set({}, {}, D);
  window.__timelines["elevenlabs-promo"] = tl;
</script>

</body>
</html>
